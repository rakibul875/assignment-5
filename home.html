<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font owesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <img src="./images/github-logo_25231 1.png" alt="">
                    <h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
                </div>
            </div>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />

                <button id="search-btn" class="btn btn-primary">+New Issue</button>
            </div>
        </div>
    </header>




    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box space-y-5">
            <div id="modal-containt" class="space-y-3">
                
            </div>

            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>




    <main class="w-11/12 mx-auto">
        <div id="all-button" class="shadow-sm mt-10 flex p-5 gap-5">
            <button onclick="loadData(event)" class="btn btn-primary">All</button>
            <button onclick="openData(event)" class="btn">Open</button>
            <button onclick="closedData(event)" class="btn">Closed</button>
        </div>
        <div class="card card-body shadow-sm">
            <div class="flex justify-between items-center gap-2">
                <div class="flex gap-3 items-center">
                    <div class=""><img src="./images/Aperture.png" alt=""></div>
                    <div class="space-y3">
                        <h2 id="issues-length" class="text-xl font-semibold">50 Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex justify-between items-center gap-5">
                    <p class="text-gray-600 text-[16px]">Open</p>
                    <p class="text-gray-600 text-[16px]">Closed</p>
                </div>
            </div>
        </div>

        <section>
            <div id="all-issues-container" class="shadow-sm grid md:grid-cols-4 grid-cols-1 mt-10 p-5 gap-6">

                <!-- <div class="space-y-3 card card-body shadow-sm border-t-6 border-t-blue-500">
                    <h1 class="text-xl font-semibold">Fix navigation menu on mobile devices</h1>
                    <p class="text-gray-600">The navigation menu doesn't collapse properly on mobile devices...</p>
                    <div class="flex gap-4">
                        <div
                            class="flex items-center p-1 bg-[#FECACA] text-[#EF4444] rounded-lg">
                            <i class="fa-brands fa-empire"></i>
                            <span>documentation</span>
                        </div>
                        <div
                            class="flex items-center p-1 bg-[#FFF8DB] text-[#D97706] rounded-lg">
                            <i class="fa-brands fa-empire"></i>
                            <span>documentation</span>
                        </div>
                    </div>
                    <p>#1
                        by john_doe</p>
                    <p>1/15/2024</p>
                </div> -->

            </div>
            <div id="loading-spinner" class="flex justify-center items-center my-20 hidden">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
        </section>




    </main>
    <script src="./home.js"></script>
</body>

</html>
