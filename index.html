<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>

<body>
    <main class="w-11/12 mx-auto">
        <section
            class="bg-white card card-body shadow-xl md:w-[500px] mx-auto flex justify-center items-center mt-20 w-11/12 space-y-3">
            <div class="space-y-3">
                <img class="mx-auto" src="./images/github-logo.png" alt="">
                <h1 class="text-2xl font-semibold text-black text-center">GitHub Issues Tracker</h1>
                <p class="text-xl text-[#64748B] text-center">Sign in to manage your issues</p>
            </div>

            <div class="">
                <div class="card bg-base-100 md:w-[500px] max-w-sm shrink-0 w-[300px]">
                    <div class="card-body">
                        <fieldset class="fieldset">
                            <label class="label text-[16px]">Username</label>
                            <input type="text" class="input" placeholder="Enter Username" />
                            <label class="label text-[16px]">Password</label>
                            <input type="password" class="input" placeholder="Enter Password" />
                            <button class="btn btn-primary mt-4">Login</button>
                        </fieldset>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
